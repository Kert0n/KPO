name: Bootstrap stable characterization baselines

on:
  push:
    branches: [test/01-stable-characterization]

permissions:
  contents: read

jobs:
  published-linux-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Capture published stable
        run: npm run test:characterization:update-published
      - name: Upload baselines
        uses: actions/upload-artifact@v4
        with:
          name: stable-linux-chromium-baselines
          path: tests/characterization/__screenshots__
          if-no-files-found: error
          retention-days: 7
