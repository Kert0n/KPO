name: Stable characterization

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: characterization-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Unit characterization
        run: npm test
      - name: Production build
        run: npm run build
      - name: Compare with published stable baselines
        run: npm run test:characterization:prebuilt
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: characterization-failure
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
