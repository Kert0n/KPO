name: Quality gates

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.classify.outputs.profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          node --experimental-strip-types scripts/ci-change-profile.mts
          --event "$EVENT_NAME" --base "$BASE_SHA" --head "$HEAD_SHA"

  quality:
    needs: changes
    runs-on: ubuntu-latest
    env:
      CI_PROFILE: ${{ needs.changes.outputs.profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - name: Auto-format tracked files for master publication
        if: env.CI_PROFILE == 'full' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          npm run format:tracked
          if ! git diff --quiet; then
            files="$(git diff --name-only | tr '\n' ' ')"
            echo "::notice title=Prettier normalized publication inputs::$files"
            {
              echo '### Prettier normalized publication inputs'
              echo
              echo 'The CI workspace was formatted without creating a commit:'
              echo
              echo '```text'
              git diff --name-only
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Check tracked formatting
        if: env.CI_PROFILE == 'full' && github.event_name != 'push'
        run: npm run format:check:tracked
      - if: env.CI_PROFILE == 'full'
        run: npm run typecheck
      - if: env.CI_PROFILE == 'full'
        run: npm run lint
      - if: env.CI_PROFILE == 'full'
        run: npm run workflow:check
      - if: env.CI_PROFILE == 'full'
        run: npm run test:fixture-isolation
      - if: env.CI_PROFILE == 'full'
        run: npm run test:coverage
      - run: npm run content:check
      - if: env.CI_PROFILE == 'full'
        run: npm run audit
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/quality.json quality "$KPO_JOB_STARTED_AT_MS"
      - name: Upload coverage and timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-artifacts
          path: |
            coverage
            .ci-artifacts/timing/quality.json
          if-no-files-found: warn
          retention-days: 7

  kotlin-playground:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run kotlin:check
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/kotlin-playground.json kotlin-playground "$KPO_JOB_STARTED_AT_MS"
      - name: Upload Kotlin manifest and timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-playground-artifacts
          path: |
            .generated/kotlin-snippets/manifest.json
            .ci-artifacts/timing/kotlin-playground.json
          if-no-files-found: warn
          retention-days: 7

  build:
    needs: [changes, quality]
    runs-on: ubuntu-latest
    env:
      CI_PROFILE: ${{ needs.changes.outputs.profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - name: Auto-format master publication inputs
        if: env.CI_PROFILE == 'full' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm run format:tracked
      - run: npm run build
      - run: npm run budgets:check
      - name: Upload production artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist
          path: .vitepress/dist
          if-no-files-found: error
          retention-days: 1
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/build.json build "$KPO_JOB_STARTED_AT_MS"
      - name: Upload build timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-timing
          path: .ci-artifacts/timing/build.json
          if-no-files-found: warn
          retention-days: 7

  browser-chromium:
    if: needs.changes.outputs.profile == 'full'
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: .vitepress/dist
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --config playwright.prebuilt.config.ts --workers=4
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/browser-chromium.json browser-chromium "$KPO_JOB_STARTED_AT_MS"
      - name: Upload Chromium diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-chromium-failure
          path: |
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 7
      - name: Upload Chromium timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-chromium-timing
          path: |
            .ci-artifacts/timing/browser-chromium.json
          if-no-files-found: warn
          retention-days: 7

  browser-smoke:
    if: needs.changes.outputs.profile == 'full'
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-smoke-${{ hashFiles('package-lock.json') }}
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: .vitepress/dist
      - run: npx playwright install --with-deps firefox webkit
      - run: npx playwright test --config playwright.smoke.config.ts
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/browser-smoke.json browser-smoke "$KPO_JOB_STARTED_AT_MS"
      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-smoke-failure
          path: |
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 7
      - name: Upload smoke timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-smoke-timing
          path: |
            .ci-artifacts/timing/browser-smoke.json
          if-no-files-found: warn
          retention-days: 7

  browser-visual:
    if: needs.changes.outputs.profile == 'full'
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-visual-${{ hashFiles('package-lock.json') }}
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: .vitepress/dist
      - run: npx playwright install --with-deps chromium
      - run: npm run test:characterization:prebuilt
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/browser-visual.json browser-visual "$KPO_JOB_STARTED_AT_MS"
      - name: Upload visual diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-visual-failure
          path: |
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 7
      - name: Upload visual timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-visual-timing
          path: |
            .ci-artifacts/timing/browser-visual.json
          if-no-files-found: warn
          retention-days: 7

  browser:
    if: always()
    needs: [changes, browser-chromium, browser-smoke, browser-visual]
    runs-on: ubuntu-latest
    env:
      CI_PROFILE: ${{ needs.changes.outputs.profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Start timer
        run: echo "KPO_JOB_STARTED_AT_MS=$(date +%s%3N)" >> "$GITHUB_ENV"
      - name: Require all browser suites
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CHROMIUM_RESULT: ${{ needs.browser-chromium.result }}
          SMOKE_RESULT: ${{ needs.browser-smoke.result }}
          VISUAL_RESULT: ${{ needs.browser-visual.result }}
        run: |
          test "$CHANGES_RESULT" = success
          if [ "$CI_PROFILE" != full ]; then
            echo "Browser suites are not affected by the $CI_PROFILE CI profile."
            exit 0
          fi
          test "$CHROMIUM_RESULT" = success
          test "$SMOKE_RESULT" = success
          test "$VISUAL_RESULT" = success
      - name: Record timing
        if: always()
        run: node scripts/record-ci-timing.mjs .ci-artifacts/timing/browser.json browser "$KPO_JOB_STARTED_AT_MS"
      - name: Upload browser aggregator timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-timing
          path: .ci-artifacts/timing/browser.json
          if-no-files-found: warn
          retention-days: 7
