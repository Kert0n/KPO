name: Scheduled maintenance

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-contracts:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Internal links and assets
        run: npm run content:check
      - name: Published site and Kotlin API availability
        run: |
          curl --fail --location --retry 2 https://kert0n.github.io/KPO/ >/dev/null
          curl --fail --location --retry 2 https://play.kotlinlang.org/api/compiler/latest >/dev/null
