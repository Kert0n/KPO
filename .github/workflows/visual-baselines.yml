name: Generate Linux visual baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-baselines:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:visual -- --update-snapshots
      - name: Upload Linux Chromium baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-chromium-visual-baselines
          path: tests/ui/__screenshots__
          if-no-files-found: error
